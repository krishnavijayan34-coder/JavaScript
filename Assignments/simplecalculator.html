<!DOCTYPE html>
<html>
<body>
<h1>simple calculator with switch case</h1>
<script>
let a=Number(prompt("Enter First Number :"));
let b=Number(prompt("Enter Second Number :"));
let OP=prompt("Enter Operator (+,-,*,/) : ");
switch(OP){
    case "+" :alert(a+b);break;
    case "-": alert(a - b); break;
    case "*": alert(a * b); break;
    case "/": alert(b !== 0 ? a / b : "Cannot divide by zero"); break;
    default: alert("Invalid Operator");
}
</script>
</body>
</html>
